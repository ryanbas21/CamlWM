name: Publish to AUR

on:
  push:
    branches: [main]

concurrency:
  group: aur-publish
  cancel-in-progress: true

jobs:
  publish:
    name: update camlwm-git on AUR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up SSH for AUR
        env:
          AUR_SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "Host aur.archlinux.org" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/id_ed25519" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/camlwm-git.git aur-repo

      - name: Update PKGBUILD and generate .SRCINFO
        run: |
          cp PKGBUILD aur-repo/PKGBUILD
          cd aur-repo
          printf 'pkgbase = camlwm-git\n' > .SRCINFO
          printf '\tpkgdesc = xmonad-style tiling window manager for X11, written in OCaml\n' >> .SRCINFO
          printf '\tpkgver = 0.1.0\n' >> .SRCINFO
          printf '\tpkgrel = 1\n' >> .SRCINFO
          printf '\turl = https://github.com/ryanbas21/CamlWM\n' >> .SRCINFO
          printf '\tarch = x86_64\n' >> .SRCINFO
          printf '\tlicense = MIT\n' >> .SRCINFO
          printf '\tmakedepends = git\n' >> .SRCINFO
          printf '\tmakedepends = ocaml\n' >> .SRCINFO
          printf '\tmakedepends = dune\n' >> .SRCINFO
          printf '\tmakedepends = ocaml-ctypes\n' >> .SRCINFO
          printf '\tmakedepends = ocaml-findlib\n' >> .SRCINFO
          printf '\tdepends = libx11\n' >> .SRCINFO
          printf '\tprovides = camlwm\n' >> .SRCINFO
          printf '\tconflicts = camlwm\n' >> .SRCINFO
          printf '\tsource = git+https://github.com/ryanbas21/CamlWM.git\n' >> .SRCINFO
          printf '\tsha256sums = SKIP\n' >> .SRCINFO
          printf '\npkgname = camlwm-git\n' >> .SRCINFO

      - name: Push to AUR
        run: |
          cd aur-repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No changes to publish"
          else
            git commit -m "Update to $(git -C "$GITHUB_WORKSPACE" rev-parse --short HEAD)"
            git push
          fi
