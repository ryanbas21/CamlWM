[bar/camlwm-test]
width = 100%
height = 28
radius = 0
fixed-center = true
bottom = false
override-redirect = false
wm-restack = generic
background = #222222
foreground = #eeeeee
font-0 = monospace:size=10
modules-left = title
modules-center = date
modules-right = workspaces
tray-position = none

[module/date]
type = internal/date
interval = 1
date = %H:%M:%S
label = %date%

[module/title]
type = internal/xwindow
label = %title:0:60%
label-empty = camlWM + polybar strut test

[module/workspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = #555555
label-occupied = %name%
label-empty = %name%
